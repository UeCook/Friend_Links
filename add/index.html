<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加友链 · 圣堂之魂</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">

        <header class="topbar">
            <div class="topbar-brand">
                <a href="../index.html" class="brand-back" title="返回友链页" aria-label="返回友链页">
                    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <h1 class="brand-title">添加友链</h1>
            </div>
            <div class="topbar-actions">
                <a class="btn-ghost btn-sm btn-icon" id="btn-help" title="使用帮助" aria-label="使用帮助" href="" target="_blank" rel="noopener noreferrer">
                    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                </a>
                <button class="btn-ghost btn-sm btn-icon" id="theme-toggle" title="切换主题" aria-label="切换主题">
                    <svg class="ic ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                    <svg class="ic ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                </button>
            </div>
        </header>

        <main class="layout">

            <section class="col-form">

                <div class="card">
                    <header>
                        <h2>基本信息</h2>
                        <p>用于卡片上展示的名称、头像与副标题。</p>
                    </header>
                    <section>
                        <form class="form" id="basic-form" autocomplete="off">
                            <div role="group" class="field">
                                <label for="f-name">名称 <span class="req">必填</span></label>
                                <input id="f-name" type="text" placeholder="如：圣堂之魂" maxlength="40" aria-describedby="name-help">
                                <p id="name-help" class="err" role="alert" hidden></p>
                            </div>

                            <div role="group" class="field">
                                <label for="f-avatar">头像 URL <span class="hint-optional">选填</span></label>
                                <input id="f-avatar" type="url" placeholder="https://github.com/<ID>.png" aria-describedby="avatar-help">
                                <p id="avatar-help" class="hint">建议正方形图片，需为 https://。</p>
                            </div>

                            <div role="group" class="field">
                                <label for="f-title">
                                    副标题
                                    <span class="counter" id="title-count">0 / 70</span>
                                </label>
                                <input id="f-title" type="text" placeholder="如：是圣堂呀，请你吃青苹果！" maxlength="70">
                            </div>
                        </form>
                    </section>
                </div>

                <div class="card">
                    <header>
                        <div class="card-head-row">
                            <div>
                            <h2>链接</h2>
                            <p>最多 4 个，第 1 个必填。地址支持 <code>https://</code> 或 <code>mailto:</code>。</p>
                            </div>
                            <span class="badge-secondary" id="link-count-badge">1 / 4</span>
                        </div>
                    </header>
                    <section>
                        <div id="links-container" class="links-container"></div>

                        <button type="button" class="btn-outline btn-sm add-link-btn" id="add-link">
                            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                            <span>添加链接</span>
                        </button>
                    </section>
                </div>

                <div class="actions">
                    <button type="button" class="btn-ghost btn-sm" id="btn-example">载入示例</button>
                    <button type="button" class="btn-ghost btn-sm" id="btn-reset">重置</button>
                </div>

            </section>

            <aside class="col-output">

                <div class="card preview-card">
                    <header>
                        <h2>预览</h2>
                    </header>
                    <section class="preview-section">
                        <div id="preview"></div>
                    </section>
                </div>

                <div class="code-block">
                    <button type="button" class="btn-ghost btn-sm btn-icon code-copy" id="btn-copy" title="复制" aria-label="复制代码">
                        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    </button>
                    <pre><code id="code-output"></code></pre>
                </div>

                <a class="btn submit-btn" href="https://github.com/UeCook/Friend_Links/issues/new" target="_blank" rel="noopener noreferrer">
                    <svg class="ic" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.2.8-.5v-2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.6 18 4.9 18 4.9c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.5 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
                    <span>前往 GitHub Issue 提交</span>
                    <svg class="ic ic-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
                </a>

            </aside>

        </main>
    </div>

    <div id="toaster" class="toaster" data-align="end"></div>

    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/basecoat.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/toast.min.js" defer></script>
    <script src="../font/lucide.min.js" defer></script>
    <script src="../font/feather.min.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
